ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    two_d_mode: true
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # ODOM: Use X, Y (position) and Yaw (orientation), plus velocities (VX, Vyaw)
    # Indices: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    odom0: /int_brain/odom
    odom0_config: [true,  true,  false, 
                   false, false, true, 
                   true,  false, false, 
                   false, false, true, 
                   false, false, false]
    odom0_differential: false

    # IMU: Use Roll, Pitch, Yaw (from Madgwick) and Angular Velocity (vroll, vpitch, vyaw)
    # EXCLUDE: Linear Acceleration (ax, ay, az) - this is the source of your drift
    imu0: /imu/data 
    imu0_config: [false, false, false, 
                  true,  true,  true, 
                  false, false, false, 
                  true,  true,  true, 
                  false, false, false] 
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true