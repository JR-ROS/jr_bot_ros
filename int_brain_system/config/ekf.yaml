ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    two_d_mode: true

    # Frames
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # --- Sensor Inputs ---
    # format: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]

    odom0: /int_brain/odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false

    imu0: /imu_sensor_broadcaster/imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true, true, false]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true
    
