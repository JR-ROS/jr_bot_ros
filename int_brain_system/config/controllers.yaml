controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: imu_sensor
    frame_id: imu_link
    # static_covariance_angular_velocity: [0.000300, -0.000051, 0.000005, -0.000051, 0.000946, 0.000026, 0.000005, 0.000026, 0.000616]
    # static_covariance_linear_acceleration: [0.006914, -0.000597, 0.000519, -0.000597, 0.003977, -0.000170, 0.000519, -0.000170, 0.003696]

mecanum_drive_controller:
  ros__parameters:
    reference_timeout: 5.0

    front_left_wheel_command_joint_name: front_left_shaft_joint
    front_right_wheel_command_joint_name: front_right_shaft_joint
    rear_left_wheel_command_joint_name: rear_left_shaft_joint
    rear_right_wheel_command_joint_name: rear_right_shaft_joint

    use_stamped_vel: false
    in_chained_mode: false

    kinematics:
      wheels_radius: 0.04
      sum_of_robot_center_projection_on_X_Y_axis: 0.146

    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
